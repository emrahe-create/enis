name: ai_wellness_mobile
description: Flutter UI for the AI wellness mobile app.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_tts: ^4.0.2
  flutter_secure_storage: ^9.2.2
  http: ^1.2.2
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  speech_to_text: ^7.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/brand/app_icon.png
    - assets/brand/logo_enis.png
    - assets/avatars/
